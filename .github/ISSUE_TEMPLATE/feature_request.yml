name: Feature request
description: Propose a new capability or a change to the training model
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the runner scenario or workflow gap. Focus on the "why".
      placeholder: As a runner training for a spring marathon, I want...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should Tempo do? Be concrete about the desired outcome, not just the code.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Engine / training math
        - API
        - Dashboard
        - Strava sync
        - Google Calendar
        - Deploy / Val Town
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false
